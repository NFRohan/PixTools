apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: pixtools-worker-standard
  namespace: pixtools
spec:
  scaleTargetRef:
    name: pixtools-worker-standard
  pollingInterval: 15
  cooldownPeriod: 180
  minReplicaCount: 1
  maxReplicaCount: 3
  fallback:
    failureThreshold: 3
    replicas: 1
  advanced:
    restoreToOriginalReplicaCount: false
    horizontalPodAutoscalerConfig:
      behavior:
        scaleUp:
          stabilizationWindowSeconds: 30
          selectPolicy: Max
          policies:
            - type: Pods
              value: 1
              periodSeconds: 30
            - type: Percent
              value: 100
              periodSeconds: 30
        scaleDown:
          stabilizationWindowSeconds: 300
          selectPolicy: Max
          policies:
            - type: Pods
              value: 1
              periodSeconds: 60
            - type: Percent
              value: 50
              periodSeconds: 60
  triggers:
    - type: rabbitmq
      metadata:
        protocol: auto
        queueName: default_queue
        mode: QueueLength
        value: "8"
        activationValue: "3"
        hostFromEnv: RABBITMQ_URL
