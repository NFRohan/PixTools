apiVersion: apps/v1
kind: Deployment
metadata:
  name: pixtools-worker-ml
  namespace: pixtools
  labels:
    app: pixtools-worker-ml
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: pixtools-worker-ml
  template:
    metadata:
      labels:
        app: pixtools-worker-ml
    spec:
      priorityClassName: pixtools-app-ml
      nodeSelector:
        pixtools-workload-app: "true"
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app: pixtools-worker-ml
            - weight: 60
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app: pixtools-worker-standard
      imagePullSecrets:
        - name: ecr-pull
      containers:
        - name: worker-ml
          image: __WORKER_IMAGE__
          imagePullPolicy: IfNotPresent
          command:
            - celery
            - -A
            - app.tasks.celery_app
            - worker
            - -Q
            - ml_inference_queue
            - --pool=solo
            - --without-gossip
            - --without-mingle
            - --loglevel=info
          envFrom:
            - configMapRef:
                name: pixtools-config
            - secretRef:
                name: pixtools-runtime
          resources:
            requests:
              cpu: "500m"
              memory: "1024Mi"
            limits:
              cpu: "1500m"
              memory: "2048Mi"
